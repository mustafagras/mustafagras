name: Update profile summary cards

on:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/workflows/profile-summary-cards.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Generate GitHub profile cards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # SUMMARY_GITHUB_TOKEN is optional. Add it for private-repository data.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || github.token }}
        with:
          USERNAME: mustafagras
          BRANCH_NAME: main
          UTC_OFFSET: 3
          AUTO_PUSH: true
          THEME: github_dark
